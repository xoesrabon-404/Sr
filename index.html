<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ CRITICAL WARNING ⚠️</title>
    <style>
        body { background: black; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index: 1000; display: flex; align-items: center; justify-content: center; color: white; border: 10px solid red; cursor: pointer; text-align: center; }
        video { position: fixed; top:0; left:0; width:100%; height:100%; object-fit: cover; display: none; }
        h1 { font-size: 40px; color: #0f0; margin-bottom: 0; }
        .jod { color: red; font-size: 25px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startPrank()">
        <div>
            <h1 style="color: #0f0;">⚠️ ERROR 444 ⚠️</h1>
            <p>INFECTED BY:</p>
            <div class="jod">Cyber Jod Srabon 444</div>
            <p style="color: yellow;">[ TAP TO RESTORE SYSTEM ]</p>
            <p style="font-size: 14px; color: #888;">(Make sure Volume is UP and Silent mode is OFF)</p>
        </div>
    </div>

    <video id="prankVideo" playsinline preload="auto">
        <source src="hack.MP4" type="video/mp4">
    </video>

    <script>
        function startPrank() {
            var video = document.getElementById('prankVideo');
            var overlay = document.getElementById('overlay');
            
            // ফুল ভলিউম এবং সাইলেন্ট মোড বাইপাস করার চেষ্টা
            video.muted = false;
            video.volume = 1.0;
            
            overlay.style.display = 'none';
            video.style.display = 'block';
            
            video.play().then(() => {
                console.log("Playing with sound!");
            }).catch(err => {
                // যদি প্রথম ক্লিকে না হয়, আবার প্লে করার চেষ্টা
                video.play();
            });
        }
    </script>
</body>
</html>
